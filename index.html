<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>amaïe</title>
    <style>
        * { box-sizing: border-box; }
        :root { --white: #FFFFFF; --charcoal: #1A1A1A; --spring: #FFB7C5; --summer: #C1E1C1; --autumn: #FFDAB9; --winter: #AEC6CF; }
        
        body { background: var(--white); color: var(--charcoal); font-family: 'Georgia', serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        #profile-header { width: 100%; max-width: 600px; padding: 60px 20px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        
        .avatar-container { width: 60px; height: 60px; border-radius: 50%; background: #f9f9f9; margin-bottom: 20px; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 0.5px solid rgba(0,0,0,0.05); }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .brand-name { font-size: 1.5rem; letter-spacing: 7px; text-transform: lowercase; font-weight: 200; margin: 0; cursor: pointer; line-height: 1.2; }
        .handle { font-family: -apple-system, sans-serif; font-size: 0.8rem; font-weight: 600; margin-top: 8px; opacity: 0.8; }
        
        .stats-row { display: flex; justify-content: center; gap: 20px; margin: 15px 0 20px; font-family: -apple-system, sans-serif; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; }
        
        #audio-trigger { font-family: -apple-system, sans-serif; font-size: 0.55rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; padding: 6px 14px; border-radius: 20px; background: #FAFAFA; border: 0.5px solid #eee; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; }
        .dot { width: 4px; height: 4px; background: var(--charcoal); border-radius: 50%; }
        .active { animation: blink 1.5s infinite; background: var(--spring)!important; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        #main-grid { display: grid; grid-template-columns: repeat(3, 1fr); width: 100%; max-width: 600px; gap: 1px; background: #FFF; flex-grow: 1; }
        .photo-card { aspect-ratio: 1 / 1; background: #FAFAFA; overflow: hidden; position: relative; cursor: pointer; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .s-0 { outline: 0.5px solid var(--spring); outline-offset: -0.5px; }
        .s-1 { outline: 0.5px solid var(--summer); outline-offset: -0.5px; }
